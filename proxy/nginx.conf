worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Rate Limiting: не более RATE_LIMIT_RPM запросов в минуту с одного IP на API
    # (значение подставляется envsubst при старте контейнера, см. docker-compose.yml)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=${RATE_LIMIT_RPM}r/m;

    upstream backend_upstream {
        server backend:8000;
    }

    # Поддержка WebSocket-проксирования (нужно для /api/translate/ws/{task_id})
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    server {
        listen 80;

        # Маршрутизация: /api/* -> backend
        location /api/ {
            limit_req zone=api_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 180s;
        }

        # Маршрутизация: всё остальное -> frontend (UI)
        location / {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
